name: Deploy a Producción (cPanel)

# Despliegue a producción por SSH/rsync, con UNA SOLA conexión SSH multiplexada.
# - Se dispara al hacer push a main (o manualmente desde Actions).
# - Espera APROBACIÓN MANUAL (environment "production" con Required reviewers).
# - NO usa --delete: nunca borra archivos que existan solo en el servidor.
# - config.php / vendor / uploads / sessions estan en .gitignore -> no viajan.
#
# IMPORTANTE (por que ControlMaster): el hosting cPanel bloquea la IP tras la
# primera conexion SSH (anti-flood CSF/cPHulk), por eso el 2do rsync daba
# "Connection timed out". Con ControlMaster abrimos UNA conexion maestra y
# rsync x2 + composer la REUTILIZAN -> el firewall ve una sola conexion.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync a cPanel (SSH multiplexado)
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout (solo archivos versionados)
        uses: actions/checkout@v4

      - name: Cargar clave SSH privada
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configurar SSH multiplexado (una sola conexion)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host deploy
            HostName ${{ secrets.SSH_HOST }}
            Port ${{ secrets.SSH_PORT || 22 }}
            User ${{ secrets.SSH_USER }}
            StrictHostKeyChecking accept-new
            ControlMaster auto
            ControlPath ~/.ssh/cm-deploy.sock
            ControlPersist 10m
            ServerAliveInterval 30
          EOF
          chmod 600 ~/.ssh/config
          # Abrir la conexion maestra UNA sola vez. rsync y composer la reutilizan.
          ssh -fN deploy
          echo "Conexion maestra establecida."

      - name: Desplegar public_html/  (document root)
        run: |
          rsync -rltvz --no-perms --no-owner --no-group \
            --exclude '.git*' \
            --exclude 'uploads/' \
            --exclude '*.log' \
            --exclude 'error_log' \
            public_html/ deploy:public_html/

      - name: Desplegar remesas_private/  (logica privada, fuera del docroot)
        run: |
          rsync -rltvz --no-perms --no-owner --no-group \
            --exclude '.git*' \
            --exclude 'config.php' \
            --exclude 'vendor/' \
            --exclude 'sessions/' \
            --exclude 'uploads/' \
            --exclude 'tests/' \
            --exclude 'phpunit.xml' \
            --exclude '.phpunit.result.cache' \
            --exclude '*.log' \
            remesas_private/ deploy:remesas_private/

      - name: Instalar dependencias en el servidor (composer, sin dev)
        run: |
          ssh deploy 'cd ~/remesas_private && { command -v composer >/dev/null 2>&1 && composer install --no-dev --optimize-autoloader --no-interaction || php composer.phar install --no-dev --optimize-autoloader --no-interaction; }'

      - name: Cerrar conexion maestra
        if: always()
        run: ssh -O exit deploy 2>/dev/null || true

      # ── MIGRACIONES DE BD: NO se ejecutan automaticamente a proposito ──
      # Aplica las migraciones nuevas a mano (phpMyAdmin o SSH). Ej.:
      #   mysql -u USUARIO -p NOMBRE_BD < migrations/003_drop_unused_user_columns.sql
