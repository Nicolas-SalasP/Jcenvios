name: Deploy a Producción (cPanel)

# Despliegue a producción por SSH/rsync.
# - Se dispara al hacer push a main (o manualmente desde la pestaña Actions).
# - Espera APROBACIÓN MANUAL gracias al environment "production"
#   (configura "Required reviewers" en Settings → Environments → production).
# - NO usa --delete: nunca borra archivos que existan solo en el servidor
#   (.htaccess, robots.txt, .well-known, cgi-bin, uploads, etc.).
# - config.php / vendor / uploads / sessions están en .gitignore, así que NO
#   forman parte del checkout y por tanto NUNCA se suben ni se sobreescriben.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync a cPanel (SSH/rsync)
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout (solo archivos versionados)
        uses: actions/checkout@v4

      - name: Cargar clave SSH privada
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Registrar host en known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT || 22 }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "Host registrado."

      - name: Desplegar public_html/  (document root)
        run: |
          rsync -rltvz --no-perms --no-owner --no-group \
            -e "ssh -p ${{ secrets.SSH_PORT || 22 }}" \
            --exclude '.git*' \
            --exclude 'uploads/' \
            --exclude '*.log' \
            --exclude 'error_log' \
            public_html/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:public_html/"

      - name: Desplegar remesas_private/  (lógica privada, fuera del docroot)
        run: |
          rsync -rltvz --no-perms --no-owner --no-group \
            -e "ssh -p ${{ secrets.SSH_PORT || 22 }}" \
            --exclude '.git*' \
            --exclude 'config.php' \
            --exclude 'vendor/' \
            --exclude 'sessions/' \
            --exclude 'uploads/' \
            --exclude 'tests/' \
            --exclude 'phpunit.xml' \
            --exclude '.phpunit.result.cache' \
            --exclude '*.log' \
            remesas_private/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:remesas_private/"

      - name: Instalar dependencias en el servidor (composer, sin dev)
        run: |
          ssh -p "${{ secrets.SSH_PORT || 22 }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'cd ~/remesas_private && { command -v composer >/dev/null 2>&1 && composer install --no-dev --optimize-autoloader --no-interaction || php composer.phar install --no-dev --optimize-autoloader --no-interaction; }'

      # ── MIGRACIONES DE BD: NO se ejecutan automáticamente a propósito ──
      # En una plataforma de dinero los cambios de esquema deben ser deliberados.
      # Aplica las migraciones nuevas manualmente (phpMyAdmin o SSH), por ejemplo:
      #   mysql -u USUARIO -p NOMBRE_BD < migrations/003_drop_unused_user_columns.sql
      # (Las migraciones del proyecto son idempotentes: usan IF EXISTS / INFORMATION_SCHEMA.)

      - name: Resumen
        run: echo "Deploy a producción completado."
